version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"   
    environment:
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=personaplex
    depends_on:
      - db
    volumes:
      - uploads:/app/uploads

  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=personaplex
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"   

volumes:
  db_data:
  uploads: